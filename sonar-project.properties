sonar.host.url=https://sonarcloud.io
sonar.projectKey=tprrt_dockers
sonar.organization=tprrt

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=dockers
sonar.projectVersion=latest

# Path is relative to the sonar-project.properties file.
sonar.sources=.

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Coverage configuration
sonar.coverage.exclusions=*

# False-positive suppressions for docker:S8541 (pip install without --only-binary :all:)
# kas and dtschema lack binary wheels; setup script execution is accepted here.
sonar.issue.ignore.multicriteria=s8541e1,s8541e2
sonar.issue.ignore.multicriteria.s8541e1.ruleKey=docker:S8541
sonar.issue.ignore.multicriteria.s8541e1.resourceKey=debian-oe/Dockerfile
sonar.issue.ignore.multicriteria.s8541e2.ruleKey=docker:S8541
sonar.issue.ignore.multicriteria.s8541e2.resourceKey=debian-cross/Dockerfile
